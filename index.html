<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/css.css">
  <title>BlestApps — Catalogue</title>
  
</head>

<body>

<header>
  <h1>📦 BlestApps</h1>
  <p>Catalogue de logiciels et applications</p>
</header>

<div class="search-bar">
  <input type="text" id="search" placeholder="🔍  Rechercher un logiciel…" oninput="render()" />
</div>

<div class="grid" id="grid"></div>

<footer>BlestApps 2026 | Tous droits reservés</footer>

<script>
/* ═══════════════════════════════════════════════
   CHARGEMENT DYNAMIQUE DES APPLICATIONS
═══════════════════════════════════════════════ */
let APPS = [];

async function loadApps() {
  const grid = document.getElementById('grid');

  try {
    console.log("👉 Chargement manifest...");

    const manifestRes = await fetch('apps/manifest.json');
    console.log("Status:", manifestRes.status);

    const text = await manifestRes.text();
    console.log("Contenu brut:", text);

    const manifest = JSON.parse(text);
    console.log("Manifest JSON:", manifest);

    const promises = manifest.apps.map(file => 
      fetch(`apps/${file}`).then(res => res.json())
    );

    APPS = await Promise.all(promises);
    render();

  } catch (error) {
    console.error("❌ ERREUR COMPLETE:", error);
    grid.innerHTML = `<div class="empty">Erreur détectée. Voir console (F12)</div>`;
  }
}

/* ═══════════════════════════════════════════════
   RENDU
═══════════════════════════════════════════════ */
function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('fr-FR', { 
    day: 'numeric', 
    month: 'short', 
    year: 'numeric' 
  });
}

function render() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  const grid = document.getElementById('grid');

  const filtered = APPS.filter(a => {
    const txt = [
      a.name,
      a.tagline || '',
      a.description,
      a.category,
      a.license || '',
      ...(a.platform || []),
      ...(a.tags || [])
    ].join(' ').toLowerCase();
    return txt.includes(q);
  });

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">Aucun résultat pour cette recherche.</div>';
    return;
  }

  grid.innerHTML = filtered.map(a => `
    <div class="card">

      <!-- FEATURED -->
      ${a.featured ? `<div class="badge" style="background:#fde68a;color:#92400e;">⭐ Populaire</div>` : ''}

      <div class="card-top">
        <div class="card-icon">${a.icon || '📦'}</div>
        <div>
          <div class="card-name">${a.name}</div>
          <div class="card-version">v${a.version} · ${a.category}</div>
        </div>
      </div>

      <!-- TAGLINE -->
      ${a.tagline ? `<div style="font-size:.8rem;color:#6366f1;font-weight:500;">${a.tagline}</div>` : ''}

      <p class="card-desc">
        ${truncate(a.description, 100)}
        ${a.description.length > 100 
          ? `<span style="color:#4f46e5; cursor:pointer;" onclick="openPopupByIndex(${APPS.indexOf(a)})"> Voir plus</span>` 
          : ''
        }
      </p>

      <!-- TAGS -->
      <div style="display:flex;gap:.35rem;flex-wrap:wrap;">
        ${(a.tags || []).map(t => `<span class="badge">${t}</span>`).join('')}
      </div>

      <div class="card-meta">
        <div style="display:flex;gap:.35rem;flex-wrap:wrap;">
          ${(a.platform||[]).map(p => `<span class="badge">${p}</span>`).join('')}
          ${a.license ? `<span class="badge">${a.license}</span>` : ''}
          ${a.size ? `<span class="badge">${a.size}</span>` : ''}
        </div>
        <span>📅 ${formatDate(a.published_at)}</span>
      </div>

      <!-- ACTIONS -->
      <div style="display:flex;gap:.5rem;flex-wrap:wrap;">
        ${a.download_url ? `<a class="btn-dl" href="${a.download_url}" target="_blank">↓ Télécharger</a>` : ''}
        ${a.homepage_url ? `<a class="btn-dl" style="background:#10b981" href="${a.homepage_url}" target="_blank">🌐 Site</a>` : ''}
      </div>

    </div>
  `).join('');
}

// Initialisation
document.addEventListener('DOMContentLoaded', loadApps);

function openPopup(app) {
  document.getElementById('popup-title').innerText = app.name;
  document.getElementById('popup-desc').innerText = app.description;
  document.getElementById('popup').style.display = 'flex';
}



function closePopup() {
  document.getElementById('popup').style.display = 'none';
}

function truncate(text, max = 100) {
  if (!text) return '';
  return text.length > max ? text.substring(0, max) + '...' : text;
}

function openPopupByIndex(i) {
  const app = APPS[i];
  openPopup(app);
}
</script>

<div id="popup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:1000; align-items:center; justify-content:center;">
  <div style="background:white; max-width:600px; width:90%; border-radius:12px; padding:1.5rem; position:relative;">
    
    <button onclick="closePopup()" style="position:absolute; top:10px; right:10px; border:none; background:none; font-size:1.2rem; cursor:pointer;">✖</button>
    
    <h2 id="popup-title"></h2>
    <p id="popup-desc" style="margin-top:1rem; line-height:1.6;"></p>

  </div>
</div>

</body>
</html>
